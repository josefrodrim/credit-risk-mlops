networks:
  mlops-net:
    driver: bridge

volumes:
  mlflow-data:
  prometheus-data:
  grafana-data:
  streamlit-data:

services:

  # ---- MLflow tracking server -----------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    command: >
      mlflow server
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --artifacts-destination /mlflow/artifacts
        --serve-artifacts
        --host 0.0.0.0
        --port 5000
        --allowed-hosts "*"
    ports:
      - "127.0.0.1:5001:5000"
    volumes:
      - mlflow-data:/mlflow
    networks:
      - mlops-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 20s

  # ---- Inference API --------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: credit-risk-api
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_URI: models:/credit-risk-model/Production
      PARAMS_PATH: params.yaml
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - mlops-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  # ---- Training container (one-shot) ----------------------------------------
  train:
    build:
      context: .
      dockerfile: docker/Dockerfile.train
    container_name: credit-risk-train
    command: python src/train.py --params params.yaml
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - mlops-net
    profiles:
      - train

  # ---- Nginx reverse proxy --------------------------------------------------
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mlops-net
    restart: unless-stopped

  # ---- Prometheus -----------------------------------------------------------
  prometheus:
    build:
      context: .
      dockerfile: docker/Dockerfile.prometheus
    container_name: prometheus
    expose:
      - "9090"
    volumes:
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - mlops-net
    restart: unless-stopped

  # ---- Grafana --------------------------------------------------------------
  grafana:
    build:
      context: .
      dockerfile: docker/Dockerfile.grafana
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - mlops-net
    restart: unless-stopped

  # ---- Streamlit demo -------------------------------------------------------
  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.streamlit
    container_name: credit-risk-streamlit
    environment:
      API_URL: http://api:8000
      DATA_DIR: /app/data/processed
    ports:
      - "8501:8501"
    volumes:
      - streamlit-data:/app/data
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mlops-net
    restart: unless-stopped
    profiles:
      - demo
